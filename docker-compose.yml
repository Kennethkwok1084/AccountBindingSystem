services:
  postgres:
    image: postgres:16-alpine
    container_name: abs_postgres
    environment:
      POSTGRES_DB: ${ABS_DB_NAME:?ABS_DB_NAME is required}
      POSTGRES_USER: ${ABS_DB_USER:?ABS_DB_USER is required}
      POSTGRES_PASSWORD: ${ABS_DB_PASSWORD:?ABS_DB_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "${ABS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ABS_DB_USER} -d ${ABS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: abs_backend
    environment:
      DATABASE_URL: postgresql+psycopg://${ABS_DB_USER}:${ABS_DB_PASSWORD_URLENC:?ABS_DB_PASSWORD_URLENC is required for URL-safe DB password}@postgres:5432/${ABS_DB_NAME}
      SECRET_KEY: ${ABS_SECRET_KEY:?ABS_SECRET_KEY is required}
      SESSION_COOKIE_SECURE: ${ABS_SESSION_COOKIE_SECURE:-true}
      STORAGE_ROOT: /app/storage
      BATCH_MODIFY_TEMPLATE_PATH: ${ABS_BATCH_MODIFY_TEMPLATE_PATH:-/app/批量修改资料模版.xls}
      DEFAULT_ADMIN_USERNAME: ${ABS_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${ABS_ADMIN_PASSWORD:?ABS_ADMIN_PASSWORD is required}
      AUTH_MODE: ${ABS_AUTH_MODE:-local}
      AUTH_PROXY_USER_HEADERS: ${ABS_AUTH_PROXY_USER_HEADERS:-X-Remote-User,X-Forwarded-User,Remote-User,X-Auth-Request-User}
      AUTH_PROXY_REQUIRED_SECRET_HEADER: ${ABS_AUTH_PROXY_REQUIRED_SECRET_HEADER:-}
      AUTH_PROXY_REQUIRED_SECRET: ${ABS_AUTH_PROXY_REQUIRED_SECRET:-}
      AUTH_DISABLED_USERNAME: ${ABS_AUTH_DISABLED_USERNAME:-external-admin}
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - ./批量修改资料模版.xls:/app/批量修改资料模版.xls:ro
    command: >
      sh -c "flask --app wsgi:app init-db &&
             flask --app wsgi:app seed-admin &&
             gunicorn --bind 0.0.0.0:5000 --workers ${ABS_GUNICORN_WORKERS:-2} --worker-class gthread --threads ${ABS_GUNICORN_THREADS:-4} --timeout ${ABS_GUNICORN_TIMEOUT:-1800} --graceful-timeout ${ABS_GUNICORN_GRACEFUL_TIMEOUT:-60} wsgi:app"
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: abs_scheduler
    environment:
      DATABASE_URL: postgresql+psycopg://${ABS_DB_USER}:${ABS_DB_PASSWORD_URLENC:?ABS_DB_PASSWORD_URLENC is required for URL-safe DB password}@postgres:5432/${ABS_DB_NAME}
      SECRET_KEY: ${ABS_SECRET_KEY:?ABS_SECRET_KEY is required}
      STORAGE_ROOT: /app/storage
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    command: ["python", "scheduler_runner.py"]
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: abs_nginx
    depends_on:
      - backend
    ports:
      - "${ABS_HTTP_PORT:-20220}:80"
    restart: unless-stopped

  auditor:
    build:
      context: ./auditor
      dockerfile: Dockerfile
    container_name: abs_auditor
    environment:
      # The auditor reads the business DB but only writes audit result tables.
      AUDIT_DATABASE_URL: postgresql+psycopg://${ABS_DB_USER}:${ABS_DB_PASSWORD_URLENC:?ABS_DB_PASSWORD_URLENC is required for URL-safe DB password}@postgres:5432/${ABS_DB_NAME}
      # SiliconFlow OpenAI-compatible endpoint for second-layer LLM reporting.
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-占位符}
      AUDIT_LLM_BASE_URL: ${AUDIT_LLM_BASE_URL:-https://api.siliconflow.cn/v1}
      AUDIT_RUN_CRON: ${AUDIT_RUN_CRON:-0 2 * * *}
      AUDIT_REPORT_WEBHOOK: ${AUDIT_REPORT_WEBHOOK:-}
      AUDIT_OUTPUT_DIR: /app/audit_output
      # Default model is the one we verified successfully in production-like runs.
      AUDIT_LLM_MODEL: ${AUDIT_LLM_MODEL:-Pro/moonshotai/Kimi-K2.6}
      AUDIT_LLM_TEMPERATURE: ${AUDIT_LLM_TEMPERATURE:-0.2}
      AUDIT_LLM_MAX_TOKENS: ${AUDIT_LLM_MAX_TOKENS:-2048}
      # 1800 seconds = 30 minutes; long reports may take a while.
      AUDIT_LLM_TIMEOUT_SECONDS: ${AUDIT_LLM_TIMEOUT_SECONDS:-1800}
      AUDIT_TZ: ${AUDIT_TZ:-Asia/Shanghai}
      TZ: ${AUDIT_TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - audit_output:/app/audit_output
    command: ["python", "cron_runner.py"]
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:
  audit_output:
